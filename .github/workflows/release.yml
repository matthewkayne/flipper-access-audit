name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  build-and-release:
    name: Build & publish release
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Check version consistency
        run: |
          # Extract (MAJOR, MINOR) from fap_version=(X, Y) in application.fam
          FAM_VERSION=$(grep -oP 'fap_version=\(\K[0-9]+,\s*[0-9]+' application.fam \
            | tr -d ' ')
          FAM_MAJOR=$(echo "$FAM_VERSION" | cut -d',' -f1)
          FAM_MINOR=$(echo "$FAM_VERSION" | cut -d',' -f2)
          FAM_VER="${FAM_MAJOR}.${FAM_MINOR}"

          # Strip leading 'v' from the git tag (v1.2.0 → 1.2.0)
          TAG_VER="${GITHUB_REF_NAME#v}"
          # Compare only MAJOR.MINOR (patch level not in application.fam)
          TAG_MAJOR=$(echo "$TAG_VER" | cut -d'.' -f1)
          TAG_MINOR=$(echo "$TAG_VER" | cut -d'.' -f2)
          TAG_MM="${TAG_MAJOR}.${TAG_MINOR}"

          echo "application.fam fap_version: $FAM_VER"
          echo "Git tag version (MAJOR.MINOR): $TAG_MM"

          if [ "$FAM_VER" != "$TAG_MM" ]; then
            echo "ERROR: fap_version ($FAM_VER) does not match tag ($TAG_MM)"
            exit 1
          fi
          echo "Version check passed."

      - name: Build FAP (official release SDK)
        uses: flipperdevices/flipperzero-ufbt-action@v0.1.3
        with:
          app-dir: .
          sdk-channel: release

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/access_audit.fap
          generate_release_notes: true
          fail_on_unmatched_files: true
